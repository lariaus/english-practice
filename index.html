<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <!--
      Page-wide referrer suppression: Safari doesn't honor the per-element
      `referrerPolicy` attribute for <audio> fetches (confirmed - it still
      sent a full Referer despite that), but this older, more broadly
      supported meta tag reliably controls it for all subresource requests.
      Needed so the Robot Shadowing Google-TTS playback isn't 404'd by
      Google's Referer-based hotlink protection.
    -->
    <meta name="referrer" content="no-referrer" />
    <title>English Practice</title>

    <meta name="theme-color" content="#3a7bfd" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />

    <!-- iOS "Add to Home Screen" support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="English Practice" />
    <link rel="apple-touch-icon" href="%BASE_URL%icons/apple-touch-icon.png" />

    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%icons/favicon-32.png" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
